<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Japan Travel Planner</title>

<link rel="stylesheet" href="trip.css">

</head>

<body>
    <nav>
        <button id="themeToggle">🌙</button>
    </nav>
   <div id="loadingScreen">

    <img src="./images/plane.png" id="plane" alt="Airplane">

    <div class="loadingText">
        <h1>Japan Travel Planner</h1>
        <p>Preparing your journey...</p>
    </div>

</div>

<header>

    <h1 class="logo">

        🇯🇵 Japan Travel Planner

    </h1>

    <a href="index.html" class="back-button">

        ← Back

    </a>

</header>


<!-- Hero -->

<section class="hero">

    <img id="heroImage"
         src="./images/japan.png"
         alt="Japan">

    <div class="hero-overlay">

        <h1 id="heroCity">

            Tokyo

        </h1>

        <p>

            Discover the Heart of Japan

        </p>

        <div id="heroInfo">

        </div>

    </div>

</section>



<!-- Overview -->

<section class="overview">

    <h2>

        Trip Overview

    </h2>

    <div id="overview"
         class="overview-grid">

    </div>

</section>
<!-- costs -->
<section class="costs">

    <h2>Estimated Costs</h2>

    <div id="costCards">

    </div>

</section>
<section class="weather">

    <h2>Current Weather</h2>

    <div id="weatherCard">

    </div>

</section>



<!-- Attractions -->

<section class="attractions">

    <h2>

        Top Attractions

    </h2>

    <div id="attractions">

    </div>

</section>



<!-- Timeline -->

<section class="timeline">

    <h2>

        7-Day Travel Plan

    </h2>

    <div id="timeline">

    </div>

</section>



<footer>

    Made by Shivan Murad 🇯🇵

</footer>

<script src="data.js"></script>
<script src="trip.js"></script>

</body>

</html>
